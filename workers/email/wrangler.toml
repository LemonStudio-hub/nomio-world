# Email Queue Consumer
# 从队列中消费邮件并写入D1
name = "nomio-email"
main = "src/consumer.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "nomio-prod-db"
database_id = "540a34d9-5d96-4bbf-8e44-00127652f032"

[[queues.consumers]]
queue = "nomio-email-queue"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 3
dead_letter_queue = "nomio-email-dlq"

[vars]
MAX_MAIL_SIZE = "5242880"
RATE_LIMIT_COUNT = "3"
RATE_LIMIT_WINDOW = "300"
